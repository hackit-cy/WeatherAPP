<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kali Weather Terminal</title>
    <style>
        body {
            background-color: black;
            color: limegreen;
            font-family: monospace;
            padding: 20px;
        }
        .terminal {
            border: 2px solid limegreen;
            padding: 20px;
            inline-size: 50%; /* Logical property for width */
            margin-inline: auto; /* Centers horizontally */
            margin-block: 50px; /* Adds 50px margin to top and bottom */
        }
        input[type="text"] {
            background-color: black;
            color: limegreen;
            border: 1px solid limegreen;
            padding: 5px;
        }
        button {
            background-color: limegreen;
            color: black;
            border: none;
            padding: 5px 10px;
            cursor: pointer;
        }
        .weather-info {
            margin-block-start: 20px; /* Logical property for top margin */
        }
    </style>
</head>
<body>
    <div class="terminal">
        <h1>Kali Weather Terminal</h1>
        <form method="POST">
            <label for="city">Enter City:</label>
            <input type="text" id="city" name="city" required>
            <button type="submit">Get Weather</button>
        </form>
        {% if weather %}
            <div class="weather-info">
                <h2>Weather in {{ weather.city }}</h2>
                <p>Temperature: {{ weather.temperature }}°C</p>
                <p>Description: {{ weather.description }}</p>
                <p>Humidity: {{ weather.humidity }}%</p>
                <p>Wind Speed: {{ weather.wind_speed }} m/s</p>
                <img src="http://openweathermap.org/img/wn/{{ weather.icon }}@2x.png" alt="Weather Icon">
            </div>
        {% endif %}
    </div>
</body>
</html>
